name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}

  build-binaries:
    name: Build binary — ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: qshield-proxy
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            binary: qshield-proxy
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: qshield-proxy
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: qshield-proxy
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: qshield-proxy.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux cross-compile)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Build (cross)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cross build --release --target ${{ matrix.target }} -p qshield-proxy

      - name: Build (native)
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }} -p qshield-proxy

      - name: Upload binary
        uses: softprops/action-gh-release@v2
        with:
          files: target/${{ matrix.target }}/release/${{ matrix.binary }}

  publish-crate:
    name: Publish qshield-core to crates.io
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Publish
        run: cargo publish -p qshield-core --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  docker-publish:
    name: Publish Docker — ${{ matrix.service }}
    needs: create-release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        service: [qshield-proxy, qshield-vault-api, qshield-auth]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.${{ matrix.service }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/asman1337/${{ matrix.service }}:${{ needs.create-release.outputs.version }}
            ghcr.io/asman1337/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
